<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas - Autenticación</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-wrapper">
        <section id="login-section" class="auth-card">
            <h2>Iniciar Sesión</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Correo Electrónico</label>
                    <input type="email" id="login-email" required placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" required placeholder="******">
                </div>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>
            <p class="toggle-text">¿No tienes cuenta? <a href="#" id="go-to-register">Regístrate aquí</a></p>
        </section>

        <section id="register-section" class="auth-card hidden">
            <h2>Crear Cuenta</h2>
            <form id="register-form">
                <div class="form-group">
                    <label for="register-username">Nombre de Usuario</label>
                    <input type="text" id="register-username" required placeholder="Ej. juan123">
                </div>
                <div class="form-group">
                    <label for="register-email">Correo Electrónico</label>
                    <input type="email" id="register-email" required placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label for="register-password">Contraseña</label>
                    <input type="password" id="register-password" required minlength="6" placeholder="Mínimo 6 caracteres">
                </div>
                <div class="form-group">
                    <label for="register-confirm-password">Confirmar Contraseña</label>
                    <input type="password" id="register-confirm-password" required placeholder="Repite la contraseña">
                </div>
                <button type="submit" class="btn-primary">Registrarse</button>
            </form>
            <p class="toggle-text">¿Ya tienes cuenta? <a href="#" id="go-to-login">Inicia sesión aquí</a></p>
        </section>
    </div>

    <div id="toast-notification" class="toast"></div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
